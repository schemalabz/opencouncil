# Dependabot configuration
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    # Group low-risk updates into single PRs to reduce noise.
    groups:
      # All patch/minor production dependency bumps together.
      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      # All patch/minor dev dependency bumps together.
      development-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Major bumps (e.g. Next.js 14 -> 16) are intentionally left as
    # individual, ungrouped PRs so they can be reviewed and tested on their own.

  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
