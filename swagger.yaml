openapi: 3.0.3
info:
  title: OpenCouncil API
  version: 1.0.0
  description: >-
    API for OpenCouncil — a platform for transparent local government. This spec is auto-generated from Zod schemas used
    in the source code.
servers:
  - url: /
    description: Current environment
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: authjs.session-token
      description: Session-based authentication via Auth.js. Sign in at /sign-in to obtain a session cookie.
  schemas:
    ValidationError:
      type: object
      properties:
        error:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              message:
                type: string
              path:
                type: array
                items:
                  anyOf:
                    - type: string
                    - type: number
            required:
              - code
              - message
      required:
        - error
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    City:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          minLength: 2
        name_en:
          type: string
          minLength: 2
        name_municipality:
          type: string
          minLength: 2
        name_municipality_en:
          type: string
          minLength: 2
        timezone:
          type: string
          minLength: 1
        authorityType:
          type: string
          enum:
            - municipality
            - region
        officialSupport:
          type: boolean
        status:
          type: string
          enum:
            - pending
            - unlisted
            - listed
        supportsNotifications:
          type: boolean
        consultationsEnabled:
          type: boolean
        peopleOrdering:
          type: string
          enum:
            - default
            - partyRank
        highlightCreationPermission:
          type: string
          enum:
            - EVERYONE
            - ADMINS_ONLY
        logoImage:
          type: string
          nullable: true
        diavgeiaUid:
          type: string
          nullable: true
        wikipediaId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - name_en
        - name_municipality
        - name_municipality_en
        - timezone
        - authorityType
        - officialSupport
        - status
        - supportsNotifications
        - consultationsEnabled
        - peopleOrdering
        - highlightCreationPermission
        - logoImage
        - diavgeiaUid
        - wikipediaId
        - createdAt
        - updatedAt
    CityWithCounts:
      allOf:
        - $ref: '#/components/schemas/City'
        - type: object
          properties:
            _count:
              type: object
              properties:
                persons:
                  type: integer
                parties:
                  type: integer
                councilMeetings:
                  type: integer
              required:
                - persons
                - parties
                - councilMeetings
          required:
            - _count
    CityMinimal:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        name_en:
          type: string
        name_municipality:
          type: string
        name_municipality_en:
          type: string
        logoImage:
          type: string
          nullable: true
        supportsNotifications:
          type: boolean
        status:
          type: string
          enum:
            - pending
            - unlisted
            - listed
        officialSupport:
          type: boolean
        authorityType:
          type: string
          enum:
            - municipality
            - region
        _count:
          type: object
          properties:
            persons:
              type: integer
            parties:
              type: integer
            councilMeetings:
              type: integer
          required:
            - persons
            - parties
            - councilMeetings
      required:
        - id
        - name
        - name_en
        - name_municipality
        - name_municipality_en
        - logoImage
        - supportsNotifications
        - status
        - officialSupport
        - authorityType
        - _count
    CityWithGeometry:
      allOf:
        - $ref: '#/components/schemas/City'
        - type: object
          properties:
            geometry:
              type: object
              nullable: true
              additionalProperties:
                nullable: true
              description: GeoJSON geometry
    Message:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    CreateCityRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        name_en:
          type: string
          minLength: 2
        name_municipality:
          type: string
          minLength: 2
        name_municipality_en:
          type: string
          minLength: 2
        timezone:
          type: string
          minLength: 1
        authorityType:
          type: string
          enum:
            - municipality
            - region
        officialSupport:
          type: string
        status:
          type: string
          enum:
            - pending
            - unlisted
            - listed
        supportsNotifications:
          type: string
        consultationsEnabled:
          type: string
        peopleOrdering:
          type: string
          enum:
            - default
            - partyRank
        highlightCreationPermission:
          type: string
          enum:
            - EVERYONE
            - ADMINS_ONLY
        diavgeiaUid:
          type: string
        id:
          type: string
          minLength: 2
          pattern: ^[a-z-]+$
        logoImage:
          type: string
          format: binary
          description: Logo image file
      required:
        - name
        - name_en
        - name_municipality
        - name_municipality_en
        - timezone
        - authorityType
        - officialSupport
        - status
        - supportsNotifications
        - consultationsEnabled
        - peopleOrdering
        - highlightCreationPermission
        - id
        - logoImage
    UpdateCityRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        name_en:
          type: string
          minLength: 2
        name_municipality:
          type: string
          minLength: 2
        name_municipality_en:
          type: string
          minLength: 2
        timezone:
          type: string
          minLength: 1
        authorityType:
          type: string
          enum:
            - municipality
            - region
        officialSupport:
          type: string
        status:
          type: string
          enum:
            - pending
            - unlisted
            - listed
        supportsNotifications:
          type: string
        consultationsEnabled:
          type: string
        peopleOrdering:
          type: string
          enum:
            - default
            - partyRank
        highlightCreationPermission:
          type: string
          enum:
            - EVERYONE
            - ADMINS_ONLY
        diavgeiaUid:
          type: string
        logoImage:
          type: string
          format: binary
          description: Replacement logo image file
    AdministrativeBody:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        cityId:
          type: string
      required:
        - id
        - name
        - cityId
    Meeting:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        name_en:
          type: string
        dateTime:
          type: string
          format: date-time
        cityId:
          type: string
        youtubeUrl:
          type: string
          nullable: true
        agendaUrl:
          type: string
          nullable: true
        released:
          type: boolean
        muxPlaybackId:
          type: string
          nullable: true
        administrativeBodyId:
          type: string
          nullable: true
        administrativeBody:
          allOf:
            - $ref: '#/components/schemas/AdministrativeBody'
            - nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - name_en
        - dateTime
        - cityId
        - youtubeUrl
        - agendaUrl
        - released
        - muxPlaybackId
        - administrativeBodyId
        - administrativeBody
        - createdAt
        - updatedAt
    CreateMeeting:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        name_en:
          type: string
          minLength: 2
        date:
          type: string
        youtubeUrl:
          anyOf:
            - type: string
              format: uri
            - type: string
              enum:
                - ''
        agendaUrl:
          anyOf:
            - type: string
              format: uri
            - type: string
              enum:
                - ''
        meetingId:
          type: string
          minLength: 1
        administrativeBodyId:
          type: string
      required:
        - name
        - name_en
        - date
        - meetingId
    SearchRequest:
      type: object
      properties:
        query:
          type: string
          minLength: 1
        cityIds:
          type: array
          items:
            type: string
        personIds:
          type: array
          items:
            type: string
        partyIds:
          type: array
          items:
            type: string
        topicIds:
          type: array
          items:
            type: string
        dateRange:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
          required:
            - start
            - end
        location:
          type: object
          properties:
            point:
              type: object
              properties:
                lat:
                  type: number
                lon:
                  type: number
              required:
                - lat
                - lon
            radius:
              type: number
              minimum: 0
              maximum: 100
              default: 5
          required:
            - point
        page:
          type: integer
          minimum: 1
          default: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        detailed:
          type: boolean
          default: false
      required:
        - query
    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              meetingId:
                type: string
              cityId:
                type: string
              utteranceId:
                type: string
              text:
                type: string
              score:
                type: number
            required:
              - meetingId
              - cityId
              - text
              - score
          description: Matching search results
        pagination:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            pageSize:
              type: integer
            totalPages:
              type: integer
          required:
            - total
            - page
            - pageSize
            - totalPages
      required:
        - results
        - pagination
    SearchError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
          required:
            - code
            - message
      required:
        - error
    Party:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        name_en:
          type: string
        name_short:
          type: string
        name_short_en:
          type: string
        colorHex:
          type: string
        logo:
          type: string
          nullable: true
        cityId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - name_en
        - name_short
        - name_short_en
        - colorHex
        - logo
        - cityId
        - createdAt
        - updatedAt
    PartyWithPeople:
      allOf:
        - $ref: '#/components/schemas/Party'
        - type: object
          properties:
            people:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  name_en:
                    type: string
                  name_short:
                    type: string
                  name_short_en:
                    type: string
                required:
                  - id
                  - name
                  - name_en
                  - name_short
                  - name_short_en
          required:
            - people
    PartyRequest:
      type: object
      properties:
        name:
          type: string
        name_en:
          type: string
        name_short:
          type: string
        name_short_en:
          type: string
        colorHex:
          type: string
          description: 'Hex color code, e.g. #3B82F6'
        logo:
          type: string
          format: binary
          description: Logo image file
      required:
        - name
        - name_en
        - name_short
        - name_short_en
        - colorHex
    Person:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        name_en:
          type: string
        name_short:
          type: string
        name_short_en:
          type: string
        image:
          type: string
          nullable: true
        profileUrl:
          type: string
          nullable: true
        cityId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - name_en
        - name_short
        - name_short_en
        - image
        - profileUrl
        - cityId
        - createdAt
        - updatedAt
    PersonWithRoles:
      allOf:
        - $ref: '#/components/schemas/Person'
        - type: object
          properties:
            roles:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  partyId:
                    type: string
                    nullable: true
                  administrativeBodyId:
                    type: string
                    nullable: true
                  title:
                    type: string
                    nullable: true
                  from:
                    type: string
                    nullable: true
                  until:
                    type: string
                    nullable: true
                required:
                  - id
                  - partyId
                  - administrativeBodyId
                  - title
                  - from
                  - until
          required:
            - roles
    PersonRequest:
      type: object
      properties:
        name:
          type: string
        name_en:
          type: string
        name_short:
          type: string
        name_short_en:
          type: string
        profileUrl:
          type: string
        image:
          type: string
          format: binary
          description: Profile image file
        roles:
          type: string
          description: JSON array of role objects
      required:
        - name
        - name_en
        - name_short
        - name_short_en
    MeetingData:
      type: object
      properties:
        meeting:
          $ref: '#/components/schemas/Meeting'
        transcriptHiddenForReview:
          type: boolean
        transcript:
          type: array
          items:
            nullable: true
        speakerTags:
          type: array
          items:
            nullable: true
        people:
          type: array
          items:
            nullable: true
        parties:
          type: array
          items:
            nullable: true
        subjects:
          type: array
          items:
            nullable: true
        city:
          nullable: true
        taskStatus:
          nullable: true
      required:
        - meeting
        - transcriptHiddenForReview
        - transcript
        - speakerTags
        - people
        - parties
        - subjects
  parameters: {}
paths:
  /api/cities:
    get:
      summary: List cities
      description: >-
        Returns all listed cities with counts of persons, parties, and released meetings. When includeUnlisted=true,
        also includes unlisted cities the authenticated user can administer.
      tags:
        - Cities
      parameters:
        - schema:
            type: string
            description: When "true", includes unlisted cities the user can administer
            example: 'false'
          required: false
          name: includeUnlisted
          in: query
      responses:
        '200':
          description: List of cities with counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CityWithCounts'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    post:
      summary: Create a city
      description: >-
        Creates a new city. Requires superadmin authorization. Accepts multipart/form-data with city fields and a logo
        image.
      tags:
        - Cities
      security:
        - sessionAuth: []
      x-access-level: superadmin
      requestBody:
        required: true
        description: City creation data as multipart/form-data
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateCityRequest'
      responses:
        '200':
          description: Created city
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/City'
        '400':
          description: Invalid city data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized — not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cities/all:
    get:
      summary: List all cities (minimal)
      description: Returns all cities with minimal fields and counts. Used for public city selectors and maps.
      tags:
        - Cities
      responses:
        '200':
          description: List of minimal city objects with counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CityMinimal'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cities/{cityId}:
    get:
      summary: Get a city
      description: Returns a single city by ID including PostGIS geometry.
      tags:
        - Cities
      parameters:
        - schema:
            type: string
            description: City ID
            example: athens
          required: true
          name: cityId
          in: path
      responses:
        '200':
          description: City data with geometry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CityWithGeometry'
        '404':
          description: City not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update a city
      description: Updates an existing city. Requires admin authorization for the city.
      tags:
        - Cities
      security:
        - sessionAuth: []
      x-access-level: admin
      parameters:
        - schema:
            type: string
            description: City ID
            example: athens
          required: true
          name: cityId
          in: path
      requestBody:
        required: true
        description: City update data as multipart/form-data (all fields optional)
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateCityRequest'
      responses:
        '200':
          description: Updated city
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/City'
        '400':
          description: Invalid city data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized — admin access required for this city
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a city
      description: Deletes a city. Requires admin authorization for the city.
      tags:
        - Cities
      security:
        - sessionAuth: []
      x-access-level: admin
      parameters:
        - schema:
            type: string
            description: City ID
            example: athens
          required: true
          name: cityId
          in: path
      responses:
        '200':
          description: City deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Unauthorized — admin access required for this city
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cities/{cityId}/meetings:
    get:
      summary: List meetings for a city
      description: Returns released meetings for the given city, ordered by date descending.
      tags:
        - Meetings
      parameters:
        - schema:
            type: string
            description: City ID
            example: athens
          required: true
          name: cityId
          in: path
        - schema:
            type: string
            description: Maximum number of meetings to return (1-100)
            example: '10'
          required: false
          name: limit
          in: query
      responses:
        '200':
          description: List of meetings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Meeting'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a meeting
      description: Creates a new council meeting for the given city. Requires admin authorization for the city.
      tags:
        - Meetings
      security:
        - sessionAuth: []
      x-access-level: admin
      parameters:
        - schema:
            type: string
            description: City ID
            example: athens
          required: true
          name: cityId
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMeeting'
      responses:
        '201':
          description: Meeting created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '400':
          description: Invalid meeting data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '403':
          description: Forbidden — admin access required for this city
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — a meeting with this ID already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/cities/{cityId}/meetings/{meetingId}:
    get:
      summary: Get a meeting
      description: >-
        Returns full meeting data including transcript, people, parties, and subjects. Transcript is omitted when hidden
        for review.
      tags:
        - Meetings
      parameters:
        - schema:
            type: string
            description: City ID
            example: athens
          required: true
          name: cityId
          in: path
        - schema:
            type: string
            description: Meeting ID
          required: true
          name: meetingId
          in: path
      responses:
        '200':
          description: Full meeting data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeetingData'
        '404':
          description: Meeting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update a meeting
      description: Updates an existing meeting. Requires admin authorization for the city.
      tags:
        - Meetings
      security:
        - sessionAuth: []
      x-access-level: admin
      parameters:
        - schema:
            type: string
            description: City ID
            example: athens
          required: true
          name: cityId
          in: path
        - schema:
            type: string
            description: Meeting ID
          required: true
          name: meetingId
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMeeting'
      responses:
        '200':
          description: Updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meeting'
        '400':
          description: Invalid meeting data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized — admin access required for this city
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/search:
    post:
      summary: Full-text search across transcripts
      description: >-
        Searches meeting transcripts using Elasticsearch. Supports filtering by city, person, party, topic, date range,
        and geographic location.
      tags:
        - Search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: Search results with pagination
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: Invalid search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchError'
        '500':
          description: Search engine error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchError'
  /api/cities/{cityId}/parties:
    get:
      summary: List parties for a city
      tags:
        - Parties
      parameters:
